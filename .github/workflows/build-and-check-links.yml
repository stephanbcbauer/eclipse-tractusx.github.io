name: Build and check links

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-check-links:
    name: Build website and check links
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      LYCHEE_VERSION: v0.18.1
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Install lychee
        run: |
          curl -sSfL "https://github.com/lycheeverse/lychee/releases/download/lychee-${LYCHEE_VERSION}/lychee-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C /tmp/ lychee
          sudo mv /tmp/lychee /usr/local/bin/lychee

      - name: Check links
        working-directory: ${{ github.workspace }}
        run: |
          find ./build -name "*.html" \
            ! -path "*/docs-kits/[0-9][0-9].[0-9][0-9]/*" \
            ! -name "404.html" \
            -print0 | xargs -0 lychee --config .lychee.toml \
              --format markdown \
              --output "$GITHUB_STEP_SUMMARY"
