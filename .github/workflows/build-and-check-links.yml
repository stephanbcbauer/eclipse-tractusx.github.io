name: Build and check links

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-check-links:
    name: Build website and check links
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Collect HTML files to check
        run: |
          find "$GITHUB_WORKSPACE/build" -name "*.html" \
            ! -path "*/docs-kits/[0-9][0-9].[0-9][0-9]/*" \
            ! -name "404.html" \
            > /tmp/files-to-check.txt

      - name: Check links
        uses: lycheeverse/lychee-action@v2.4.1
        with:
          args: --config .lychee.toml @/tmp/files-to-check.txt
          fail: true
